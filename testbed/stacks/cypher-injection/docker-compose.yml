services:
  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/testbed123
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - testbed-net

  app:
    build: ./app
    ports:
      - "8058:8080"
    depends_on:
      - neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: testbed123
    networks:
      - testbed-net

networks:
  testbed-net:
    external: true
    name: testbed-net
